<ion-content class="login-page" fullscreen>
  <div class="wrapper">
    <app-logo></app-logo>

    <h1 class="title">Login</h1>


    <form class="login-form" [formGroup]="form" (ngSubmit)="submit()" (keypress.enter)="submit()">

      <!-- ============ Correo ============ -->
      <app-custom-input 
          class="field"
          icon="mail-outline"
          autocomplete="email"
          [control]="form.controls.email"
          type="email"
          label="Correo"
          
      ></app-custom-input>

      <div class="validators" *ngIf="form.controls.email.errors && form.controls.email.touched">
        <div  *ngIf="form.controls.email.errors?.['required']">
          El correo es requerido
        </div>
        <div  *ngIf="form.controls.email.errors?.['email']">
          El correo no es válido
        </div>
      </div>
      


      <!-- ============ Contraseña ============ -->
      <app-custom-input
        icon="lock-closed-outline"
        [control]="form.controls.password"
        type="password"
        label="Contraseña"
      ></app-custom-input>
    
      <div class="validators" *ngIf="form.controls.password.errors && form.controls.password.touched">
        <div  *ngIf="form.controls.password.errors?.['required']">
          La contraseña es requerida
        </div>
      </div>

      <p class="ion-text-end" [routerLink]="['/forgot-password']">¿Olvidaste tu contraseña?</p>

      <ion-button (click)="onClick()" class="ion-margin-top" expand="block" mode="ios" >
        Ingresar con Google
        <ion-icon slot="start" name="logo-google"></ion-icon>
        
      </ion-button>

      <ion-button class="ion-margin-top" expand="block" mode="ios" class="submit" type="submit" [disabled]="form.invalid">
        Ingresar
        <ion-icon slot="end" name="log-in-outline"></ion-icon>
      </ion-button>

      <ion-button class="ion-margin-top" [routerLink]="['/sign-up']" routerLinkActive="router-link-active"  expand="block" mode="ios" fill="outline" >
        Registrarse
        <ion-icon slot="end" name="person-add-outline"></ion-icon>
      </ion-button>


    </form>
  </div>
</ion-content>
