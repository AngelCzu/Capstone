<ion-content class="login-page" fullscreen>
  <app-header backButton="/login" title="Recuperar Cuenta"></app-header>
  <div class="wrapper">
    <app-logo></app-logo>




    <form class="login-form" [formGroup]="form" (ngSubmit)="submit()" (keypress.enter)="submit()">


      <!-- ============ Correo ============ -->

      <app-custom-input 
          class="field"
          icon="mail-outline"
          autocomplete="email"
          [control]="form.controls.email"
          type="email"
          label="Correo"
          
      ></app-custom-input>

      <div class="validators" *ngIf="form.controls.email.errors && form.controls.email.touched">
        <div  *ngIf="form.controls.email.errors?.['required']">El correo es requerido</div>
        <div  *ngIf="form.controls.email.errors?.['email']">El correo no es válido</div>
      </div>
      


      <ion-button class="ion-margin-top" expand="block" mode="ios" class="submit" type="submit" [disabled]="form.invalid">
        Recuperar
        <ion-icon slot="end" name="arrow-forward"></ion-icon>
      </ion-button>

      


    </form>
  </div>
</ion-content>
