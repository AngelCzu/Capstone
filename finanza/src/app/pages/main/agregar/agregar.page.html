<app-header backButton="/login" title="Agregar"></app-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">agregar</ion-title>
    </ion-toolbar>
  </ion-header>

  <form>
    <ion-list>
      <ion-item>
        <ion-label position="floating">Nombre</ion-label>
        <ion-input type="text" name="nombre" required></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Correo electrónico</ion-label>
        <ion-input type="email" name="correo" required></ion-input>
      </ion-item>
    </ion-list>
    <ion-button expand="block" type="submit">Enviar</ion-button>
  </form>
</ion-content>

<app-navbar></app-navbar>
