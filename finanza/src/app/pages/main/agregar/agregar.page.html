<app-header backButton="/main/home" title="Agregar"></app-header>

<ion-content class="ion-padding">

  <!-- Selector de tipo -->
  <ion-item>
    <ion-label>Tipo de movimiento</ion-label>
    <ion-select [formControl]="tipoSeleccionado" interface="popover">
      <ion-select-option value="ingreso">Ingreso</ion-select-option>
      <ion-select-option value="gasto">Gasto</ion-select-option>
      <ion-select-option value="deuda">Deuda</ion-select-option>
      <ion-select-option value="objetivo">Objetivo</ion-select-option>
    </ion-select>
  </ion-item>

  <!-- ====================== FORMULARIO INGRESO ====================== -->
  <form *ngIf="tipoSeleccionado.value === 'ingreso'" [formGroup]="formIngreso" (ngSubmit)="guardarIngreso()">
    <app-custom-input
      icon="document-text-outline"
      [control]="formIngreso.controls.origen"
      type="text"
      label="Origen del dinero"
    ></app-custom-input>

    <app-custom-input
      icon="cash-outline"
      [control]="formIngreso.controls.monto"
      type="number"
      label="Monto"
    ></app-custom-input>


    <ion-button expand="block" color="success" type="submit" [disabled]="formIngreso.invalid">
      Guardar ingreso
    </ion-button>
  </form>

  <!-- ====================== FORMULARIO GASTO ====================== -->
  <form *ngIf="tipoSeleccionado.value === 'gasto'" [formGroup]="formGasto" (ngSubmit)="guardarGasto()">
    <app-custom-input
      icon="cart-outline"
      [control]="formGasto.controls.nombre"
      type="text"
      label="Nombre del gasto"
    ></app-custom-input>

    <app-custom-input
      icon="cash-outline"
      [control]="formGasto.controls.monto"
      type="number"
      label="Monto"
    ></app-custom-input>

    <ion-item lines="none">
      <ion-label>¿Es compartido?</ion-label>
      <ion-toggle formControlName="compartido" (ionChange)="gastoCompartidoChanged()"></ion-toggle>
    </ion-item>

    <ion-item *ngIf="formGasto.controls.compartido.value">
      <app-custom-input
        icon="person-add-outline"
        [control]="nuevoParticipanteGasto"
        type="text"
        label="Nombre del participante"
      ></app-custom-input>
      <ion-button (click)="agregarParticipanteGasto()">Agregar</ion-button>
    </ion-item>

    <ion-list *ngIf="formGasto.controls.compartido.value && participantesGasto.length > 0">
      <ion-item>
        <ion-label><strong>Participantes</strong></ion-label>
      </ion-item>

      <ion-item *ngFor="let p of participantesGasto.controls; let i = index">
        <ion-badge *ngIf="p.get('nombre')?.value === currentUserName" color="primary" slot="start">Yo</ion-badge>
        <ion-input [value]="p.get('nombre')?.value" readonly></ion-input>
        <ion-input
          type="number"
          [value]="p.get('porcentaje')?.value"
          (ionChange)="porcentajeCambiadoGasto(i, $event.detail.value)"
          placeholder="%"
        ></ion-input>
        <ion-button color="danger" *ngIf="p.get('nombre')?.value !== currentUserName" (click)="eliminarParticipanteGasto(i)">
          <ion-icon name="trash-outline"></ion-icon>
        </ion-button>
      </ion-item>
    </ion-list>

    <ion-button expand="block" color="danger" type="submit" [disabled]="formGasto.invalid">
      Guardar gasto
    </ion-button>
  </form>

  <!-- ====================== FORMULARIO DEUDA ====================== -->
  <form *ngIf="tipoSeleccionado.value === 'deuda'" [formGroup]="formDeuda" (ngSubmit)="guardarDeuda()">
    <app-custom-input
      icon="card-outline"
      [control]="formDeuda.controls.nombre"
      type="text"
      label="Nombre de la deuda"
    ></app-custom-input>

    <app-custom-input
      icon="cash-outline"
      [control]="formDeuda.controls.monto"
      type="number"
      label="Monto total"
    ></app-custom-input>

    <app-custom-input
      icon="calendar-outline"
      [control]="formDeuda.controls.cuotas"
      type="number"
      label="Cantidad de cuotas"
    ></app-custom-input>

    <ion-item lines="none">
      <ion-label>¿Compartido?</ion-label>
      <ion-toggle formControlName="compartido" (ionChange)="deudaCompartidoChanged()"></ion-toggle>
    </ion-item>

    <ion-item *ngIf="formDeuda.controls.compartido.value">
      <app-custom-input
        icon="person-add-outline"
        [control]="nuevoParticipanteDeuda"
        type="text"
        label="Nombre del participante"
      ></app-custom-input>
      <ion-button (click)="agregarParticipanteDeuda()">Agregar</ion-button>
    </ion-item>

    <ion-list *ngIf="formDeuda.controls.compartido.value && participantesDeuda.length > 0">
      <ion-item>
        <ion-label><strong>Participantes</strong></ion-label>
      </ion-item>

      <ion-item *ngFor="let p of participantesDeuda.controls; let i = index">
        <ion-badge *ngIf="p.get('nombre')?.value === currentUserName" color="primary" slot="start">Yo</ion-badge>
        <ion-input [value]="p.get('nombre')?.value" readonly></ion-input>
        <ion-input
          type="number"
          [value]="p.get('porcentaje')?.value"
          (ionChange)="porcentajeCambiadoDeuda(i, $event.detail.value)"
          placeholder="%"
        ></ion-input>
        <ion-button color="danger" *ngIf="p.get('nombre')?.value !== currentUserName" (click)="eliminarParticipanteDeuda(i)">
          <ion-icon name="trash-outline"></ion-icon>
        </ion-button>
      </ion-item>
    </ion-list>

    <ion-button expand="block" color="warning" type="submit" [disabled]="formDeuda.invalid">
      Guardar deuda
    </ion-button>
  </form>

  <!-- ====================== FORMULARIO OBJETIVO ====================== -->
<form *ngIf="tipoSeleccionado.value === 'objetivo'" [formGroup]="formObjetivo" (ngSubmit)="guardarObjetivo()">
  
  <app-custom-input
    icon="trophy-outline"
    [control]="formObjetivo.controls.nombre"
    type="text"
    label="Nombre del objetivo"
  ></app-custom-input>

  <app-custom-input
    icon="cash-outline"
    [control]="formObjetivo.controls.monto"
    type="number"
    label="Monto a alcanzar"
  ></app-custom-input>

  <app-custom-input
    icon="time-outline"
    [control]="formObjetivo.controls.tiempo"
    type="number"
    label="Tiempo estimado (meses)"
  ></app-custom-input>

  <ion-item>
    <ion-label>Seleccionar categoría</ion-label>
    <ion-select [formControl]="formObjetivo.controls.categoria" (ionChange)="asignarImagenPorCategoria()" interface="action-sheet">
      <ion-select-option value="verano">Verano</ion-select-option>
      <ion-select-option value="estudio">Estudio</ion-select-option>
      <ion-select-option value="viaje">Viaje</ion-select-option>
      <ion-select-option value="ahorro">Ahorro</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item lines="none">
    <ion-label>¿Compartido?</ion-label>
    <ion-toggle formControlName="compartido" (ionChange)="objetivoCompartidoChanged()"></ion-toggle>
  </ion-item>

  <ion-item *ngIf="formObjetivo.controls.compartido.value">
    <app-custom-input
      icon="person-add-outline"
      [control]="nuevoParticipanteObjetivo"
      type="text"
      label="Nombre del participante"
    ></app-custom-input>
    <ion-button class="ion-margin-start" (click)="agregarParticipanteObjetivo()">Agregar</ion-button>
  </ion-item>

  <ion-list *ngIf="formObjetivo.controls.compartido.value && participantesObjetivo.length > 0">
    <ion-item>
      <ion-label><strong>Participantes</strong></ion-label>
    </ion-item>

    <ion-item *ngFor="let p of participantesObjetivo.controls; let i = index">
      <ion-badge *ngIf="p.get('nombre')?.value === currentUserName" color="primary" slot="start">Yo</ion-badge>
      <ion-input [value]="p.get('nombre')?.value" readonly></ion-input>
      <ion-input
        type="number"
        [value]="p.get('porcentaje')?.value"
        (ionChange)="porcentajeCambiadoObjetivo(i, $event.detail.value)"
        placeholder="%"
      ></ion-input>
      <ion-button color="danger" *ngIf="p.get('nombre')?.value !== currentUserName" (click)="eliminarParticipanteObjetivo(i)">
        <ion-icon name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-button expand="block" color="tertiary" type="submit" [disabled]="formObjetivo.invalid">
    Guardar objetivo
  </ion-button>
</form>


</ion-content>

<app-navbar></app-navbar>
