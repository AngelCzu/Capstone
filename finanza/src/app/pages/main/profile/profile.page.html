<ion-header translucent="true">
  <ion-toolbar class="topbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title class="topbar-title">PERFIL</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear">
        <ion-icon name="settings-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="profile-page" fullscreen>
  <!-- Hero -->
  <div class="cream-card hero">
    <div class="avatar-wrap">
      <img [src]="avatarUrl" alt="avatar" class="avatar"/>
      <label class="avatar-edit">
        <ion-icon name="camera-outline"></ion-icon>
        <input type="file" accept="image/*" (change)="onAvatarChange($event)"/>
      </label>
    </div>

    <h2 class="name">{{ user.name }}</h2>
    <p class="email">{{ user.email }}</p>

    <ion-chip color="success" class="chip-ok">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
      <ion-label>Verificado</ion-label>
    </ion-chip>
  </div>
