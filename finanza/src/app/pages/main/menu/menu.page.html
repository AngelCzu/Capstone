<app-header backButton="/login" title="Menu"></app-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">menu</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>
    <ion-item routerLink="/main/agregar">
      <ion-icon name="add-circle-outline" slot="start"></ion-icon>
      <ion-label>Agregar</ion-label>
    </ion-item>
    <ion-item routerLink="/main/lista">
      <ion-icon name="list-circle-outline" slot="start"></ion-icon>
      <ion-label>Lista</ion-label>
    </ion-item>
    <ion-item routerLink="/main/grafica">
      <ion-icon name="pie-chart-outline" slot="start"></ion-icon>
      <ion-label>Gráfica</ion-label>
    </ion-item>
    <ion-item routerLink="/main/profile">
      <ion-icon name="person-circle-outline" slot="start"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-item>
    <ion-item routerLink="/main/setting">
      <ion-icon name="settings-outline" slot="start"></ion-icon>
      <ion-label>Configuracion</ion-label>
    </ion-item>
  </ion-list>
