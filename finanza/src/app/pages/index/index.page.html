<ion-header translucent="true">
  <ion-toolbar class="topbar">
    <ion-buttons slot="start">
      <ion-button fill="clear">
        <ion-icon name="person-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-title class="topbar-title">INICIO</ion-title>

    <ion-buttons slot="end">
      <ion-button class="bell" fill="clear">
        <ion-icon name="notifications-outline"></ion-icon>
        <ion-badge class="badge">1</ion-badge>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="dashboard-page" fullscreen>
  <h1 class="app-title">APP</h1>

  <!-- Tarjeta: Donut -->
  <div class="cream-card donut-card">
    <div class="donut" [style.--p]="donutDeg"></div>
    <div class="donut-center">
      <div class="amount">{{ amount | currency:'USD':'symbol':'1.0-0' }}</div>
    </div>
  </div>

  <!-- Tarjeta: Área + Tabs -->
  <div class="cream-card chart-card">
    <svg viewBox="0 0 300 120" class="area">
      <path class="area-fill"
            d="M0,100 C30,40 70,80 110,60 C150,40 190,110 230,70 C260,50 300,100 300,100 L300,120 L0,120 Z"/>
      <path class="area-line"
            d="M0,100 C30,40 70,80 110,60 C150,40 190,110 230,70 C260,50 300,100 300,100"/>
    </svg>

<ion-segment class="bottom-2131">
  <ion-segment-button value="15D"><ion-label>15D</ion-label></ion-segment-button>
  <ion-segment-button value="1M"><ion-label>1M</ion-label></ion-segment-button>
  <ion-segment-button value="1Y"><ion-label>1Y</ion-label></ion-segment-button>
</ion-segment>

  </div>
</ion-content>

<ion-footer class="bottom-nav">
  <div class="bar">
    <ion-button fill="clear"><ion-icon name="home-outline"></ion-icon></ion-button>
    <ion-button fill="clear"><ion-icon name="add-outline"></ion-icon></ion-button>
    <ion-button fill="clear"><ion-icon name="search-outline"></ion-icon></ion-button>
    <ion-button fill="clear"><ion-icon name="trophy-outline"></ion-icon></ion-button>
  </div>
</ion-footer>
