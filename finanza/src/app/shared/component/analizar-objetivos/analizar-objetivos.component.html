<div class="analizar-objetivos">
  <h2>Tus objetivos financieros</h2>

  <ng-container *ngIf="!sinObjetivos; else noData">
    <div
      class="objetivo-card"
      *ngFor="let obj of objetivos"
      [style.--color]="obj.color"
    >
      <div class="objetivo-header">
        <h3>{{ obj.nombre }}</h3>
        <p class="monto">{{ obj.monto | currency: 'CLP':'symbol' }}</p>
      </div>

      <div class="barra-container">
        <div class="barra-fondo" [class.animar]="animar">
          <div
            class="barra-progreso"
            [class.completo]="obj.progreso === 1"
            [style.width.%]="obj.progreso * 100"
            [style.background]="obj.color"
          ></div>

          <div
            class="icono"
            [style.left.%]="obj.progreso * 100"
            [class.balanceo]="animar && obj.progreso < 1"
            [class.completo]="obj.progreso === 1"
          >
            {{ obj.icono }}
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-template #noData>
    <div class="no-objetivos">
      <ion-icon name="sparkles-outline"></ion-icon>
      <p>Aún no tienes objetivos registrados</p>
    </div>
  </ng-template>
</div>
