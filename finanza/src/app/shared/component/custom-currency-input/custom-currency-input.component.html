<ion-item class="custom-input" line lines="none">
  <ion-icon class="input-icon" [name]="icon || 'cash-outline'" slot="start"></ion-icon>

  <ion-input
    appVisualCurrency
    [value]="visualValue"
    [formControl]="control"
    [label]="label"
    labelPlacement="floating"
    (ionInput)="onInputChange($event)"
    type="text"
    inputmode="numeric"
  ></ion-input>
</ion-item>
