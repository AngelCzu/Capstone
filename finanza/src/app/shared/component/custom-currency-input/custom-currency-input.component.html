<ion-item class="currency-input">
  <ion-icon class="input-icon" [name]="icon" slot="start"></ion-icon>
  <ion-label position="floating">{{ label }}</ion-label>

  <ion-input
    [value]="visualValue"
    (ionInput)="onInputChange($event)"
    type="text"
    inputmode="numeric"
    [placeholder]="placeholder"
    (ionBlur)="onTouched()"
  ></ion-input>
</ion-item>
