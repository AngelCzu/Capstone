

<ion-content class="ion-padding confirm-content">
  <div class="confirm-card">
    <!-- Ícono -->
    <ion-icon name="alert-circle-outline" class="warning-icon"></ion-icon>

    <!-- Título grande -->
    <h2>{{ title }}</h2>

    <!-- Mensaje -->
    <p [innerHTML]="message"></p>

    <!-- Botones -->
    <div class="buttons">
      <ion-button expand="block" fill="outline" color="medium" (click)="cancel()">
        <ion-icon slot="start" name="close-outline"></ion-icon>
        {{ cancelText }}
      </ion-button>
      <ion-button expand="block" color="danger" (click)="confirm()">
        <ion-icon slot="start" name="log-out-outline"></ion-icon>
        {{ confirmText }}
      </ion-button>
    </div>
  </div>
</ion-content>
