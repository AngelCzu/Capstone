<ion-content class="ion-padding pin-modal" (ionBackdropTap)="dismissOnBackdrop()">
  <div class="card">
    <ion-icon name="mail-outline" class="pin-icon"></ion-icon>

    <h2>Cambiar correo</h2>
    <p>
      Hemos enviado un código a <b>{{ email }}</b> <br> Ingrésalo para confirmar.
    </p>

    <div class="pin-row" [class.error]="error" (paste)="onPaste($event)">
      <input id="pin-0" inputmode="numeric" maxlength="1"
             (input)="onKey(0, $event)" (keydown)="onKeyDown(0, $event)" />
      <input id="pin-1" inputmode="numeric" maxlength="1"
             (input)="onKey(1, $event)" (keydown)="onKeyDown(1, $event)" />
      <input id="pin-2" inputmode="numeric" maxlength="1"
             (input)="onKey(2, $event)" (keydown)="onKeyDown(2, $event)" />
      <input id="pin-3" inputmode="numeric" maxlength="1"
             (input)="onKey(3, $event)" (keydown)="onKeyDown(3, $event)" />
      <input id="pin-4" inputmode="numeric" maxlength="1"
             (input)="onKey(4, $event)" (keydown)="onKeyDown(4, $event)" />
      <input id="pin-5" inputmode="numeric" maxlength="1"
             (input)="onKey(5, $event)" (keydown)="onKeyDown(5, $event)" />
    </div>

    <div class="buttons">
      <ion-button expand="block" fill="outline" color="medium" (click)="cancel()">
        <ion-icon slot="start" name="close-outline"></ion-icon>
        Cancelar
      </ion-button>

      <ion-button expand="block" color="primary" (click)="submit()">
        <ion-icon slot="start" name="checkmark-outline"></ion-icon>
        Validar
      </ion-button>
    </div>

    <small class="ttl">
      El código expira en ~{{ ttlSec/60 | number:'1.0-0' }} min.
    </small>
  </div>
</ion-content>
