<ion-app>
  <!-- ===== MENÚ LATERAL ===== -->
  <ion-menu side="start" menuId="main-menu" contentId="main-content">
    <ion-header class="menu-header">
      <ion-toolbar class="menu-toolbar">
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content class="menu-content">
      <!-- ===== USUARIO ===== -->
      <div class="user-info" (click)="goToProfile()">
        <div class="avatar-section">
          <ng-container *ngIf="user?.photoURL; else initials">
            <img
              [src]="user.photoURL"
              alt="avatar"
              class="avatar"
              loading="lazy"
              referrerpolicy="no-referrer"
            />
          </ng-container>

          <ng-template #initials>
            <div class="avatar initials">
              {{ getInitials(user?.name, user?.lastName) }}
            </div>
          </ng-template>
        </div>

        <h2>{{ user?.name || 'Usuario' }} {{ user?.lastName || 'Usuario'  }}</h2>
        <p>{{ user?.email || 'usuario@email.com' }}</p>
      </div>


      <!-- ===== LISTA DE ACCESOS ===== -->
      <ion-list class="menu-list" lines="none">
        <ion-item (click)="goToHome()">
          <ion-icon name="home-outline" slot="start"></ion-icon>
          <ion-label>Inicio</ion-label>
        </ion-item>

        <ion-item (click)="goToMov()">
          <ion-icon name="swap-horizontal-outline" slot="start"></ion-icon>
          <ion-label>Movimientos</ion-label>
        </ion-item>

        <ion-item (click)="goToCat()">
          <ion-icon name="list-outline" slot="start"></ion-icon>
          <ion-label>Categorías</ion-label>
        </ion-item>

        <ion-item routerLink="/main/notificaciones">
          <ion-icon name="notifications-outline" slot="start"></ion-icon>
          <ion-label>Notificaciones</ion-label>
        </ion-item>

        <ion-item routerLink="/main/exportar">
          <ion-icon name="document-text-outline" slot="start"></ion-icon>
          <ion-label>Exportar Datos</ion-label>
        </ion-item>
      </ion-list>

      <!-- ===== SEPARADOR ===== -->
      <div class="menu-separator"></div>

      <!-- ===== OPCIONES FINALES ===== -->
      <ion-list lines="none">
        <ion-item routerLink="/main/ajustes">
          <ion-icon name="settings-outline" slot="start"></ion-icon>
          <ion-label>Ajustes</ion-label>
        </ion-item>

        <ion-item button (click)="signOutConfirm()">
          <ion-icon name="log-out-outline" slot="start"></ion-icon>
          <ion-label>Salir</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- ===== CONTENIDO PRINCIPAL ===== -->
  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>
</ion-app>
